emitted_knowledge:
  - kind: antipattern
    title: "ELI/URL field stored from untrusted frontmatter without protocol allowlist"
    body: "When a URL field (eli, source, url) is extracted from user-controlled or upstream-controlled YAML frontmatter and stored verbatim in a database JSONB column, then returned to a frontend that binds it as an href, the attack vector is: attacker controls a .md file in the upstream repo → injects 'javascript:...' as the eli field → malicious scheme survives parse_frontmatter (yaml.safe_load does not validate content semantics) → stored in DB → returned by API → rendered as a live anchor in Angular. Root cause: absence of protocol allowlist at the derive_eli extraction boundary."
    tags: [security, CWE-601, python, fastapi, angular, yaml]
    confidence: 0.95

  - kind: antipattern
    title: "YAML safe_load without frontmatter byte-length guard allows alias-expansion DoS"
    body: "yaml.safe_load prevents arbitrary Python object instantiation but does NOT prevent alias-anchor billion-laughs attacks. When frontmatter is loaded from a file without a prior byte-length check, a crafted YAML block with deeply nested aliases causes exponential memory expansion inside the YAML parser before the parsed result is inspected. Root cause: trusting that safe_load is safe for resource exhaustion as well as code execution — it is not."
    tags: [security, CWE-400, python, yaml, dos]
    confidence: 0.95
