  - kind: pattern
    title: Pre-completed unit tracking in AIDLC plans
    body: "When a unit is implemented ad-hoc during plan approval, include it as a Layer 0 spec with all tasks marked COMPLETE. This preserves audit trail (where it was built, why, what it does) without blocking other units. Applied in Thermia metadata-refactor: sources-display built during plan gate, added as completed L0 unit."
