    confidence: 0.9
  - kind: lesson
    title: Hash-skip guard pattern for pgvector upserts
    body: "When embedding skip logic sets embedding=None, the ORM upsert MUST NOT write that None to the pgvector column — it overwrites the stored 1024-dimensional vector with NULL. Fix: either fetch existing embedding before merge, or conditionally set doc.embedding only when not None. Pattern documented as Risk 1 in ingestion-wiring unit spec."
    tags: ["thermia", "pgvector", "sqlalchemy", "ingestion"]
    confidence: 0.95
