emitted_knowledge:
  - kind: adr
    title: "Two-Layer Metadata Architecture: Retrieval (curated JSONB) vs Source (raw frontmatter)"
    confidence: 0.9
    tags: [adr, database, metadata, pgvector, rag, legal]
    related_artifacts:
      - aidlc-docs/operations/adrs/2026-05-19t20-50-00z-metadata-refactor-0001-two-layer-metadata-architecture.md
    body: |
      Status: Accepted

      Context:
      RAG systems that ingest structured documents (with YAML frontmatter) face a tension
      between retrieval efficiency (curated, indexable keys) and provenance preservation
      (raw original metadata). A single JSONB column cannot satisfy both.

      Decision:
      Two JSONB columns on the documents table: metadata_ (curated retrieval layer with
      fixed normalised keys: law_id, article, section, hierarchy_path, eli, status,
      legal_rank, jurisdiction, content_hash) and source_metadata_ (raw preserved
      frontmatter verbatim). The retrieval layer is the only one used by search and
      context-building code. The source layer is append-only and used only for audit
      and provenance queries.

      Consequences:
      Positive: efficient B-tree/GIN indexing on curated keys; provenance never lost;
      schema evolution is localised to the curated layer.
      Negative: two columns increase storage (negligible at this scale); ingestion must
      populate both atomically; new curated keys require a code change to
      build_metadata_payload.

  - kind: adr
    title: "only_active Filter: IN-List on status text column, not boolean column"
    confidence: 0.9
    tags: [adr, database, filter, legal, rag, schema-design]
    related_artifacts:
      - aidlc-docs/operations/adrs/2026-05-19t20-50-00z-metadata-refactor-0002-only-active-filter-in-list-semantics.md
    body: |
      Status: Accepted

      Context:
      Legal documents have nuanced vitality states (vigente, parcialmente vigente,
      derogada, unknown). A boolean is_active column loses nuance and requires a schema
      migration per new status value. An IN-list filter on a normalised text status
      column allows nuanced semantics and schema-free status vocabulary evolution.

      Decision:
      Use Document.status.IN(['vigente', 'parcialmente vigente', '']) for the only_active
      filter. The allowlist is defined in code alongside normalize_status. A B-tree index
      on status ensures filter efficiency.

      Consequences:
      Positive: partially-in-force laws appear in results (legally correct); new status
      values require only a code change; empty-string passthrough prevents silent
      exclusion of pre-normalisation documents.
      Negative: allowlist lives in application code — must be updated when normalize_status
      adds a new canonical value.

  - kind: adr
    title: "XML Delimiter Prompt Injection Mitigation in LLM Context Builder (CWE-77)"
    confidence: 0.9
    tags: [adr, security, llm, prompt-injection, rag, cwe-77]
    related_artifacts:
      - aidlc-docs/operations/adrs/2026-05-19t20-50-00z-metadata-refactor-0003-xml-delimiter-prompt-injection-mitigation.md
    body: |
      Status: Accepted

      Context:
      RAG systems that concatenate retrieved document chunks verbatim into LLM prompts
      are vulnerable to prompt injection from adversarial content in the corpus (CWE-77,
      OWASP LLM01). Blocklists are fragile. LLM-based moderation at ingestion adds
      latency and cost. Structural XML delimiters with explicit system instructions are
      a low-cost, defence-in-depth mitigation.

      Decision:
      Wrap each document chunk in <doc id="N">...</doc> XML delimiters in
      context_builder.py. Include explicit system instruction that delimited content is
      data, not instructions.

      Consequences:
      Positive: raises bar for naive injection attacks with zero latency overhead;
      improves source attribution (document numbers in LLM answer).
      Negative: does not fully prevent sophisticated attacks; depends on LLM
      instruction-following; ~10-12 tokens overhead per chunk.
      Deferred: LLM-based moderation at ingestion tracked as future work.

  - kind: adr
    title: "FastAPI Lifespan for SSH Tunnel and DB Engine Lifecycle"
    confidence: 0.9
    tags: [adr, fastapi, ssh-tunnel, lifecycle, asyncio, correctness]
    related_artifacts:
      - aidlc-docs/operations/adrs/2026-05-19t20-50-00z-metadata-refactor-0004-fastapi-lifespan-ssh-tunnel.md
    body: |
      Status: Accepted

      Context:
      Per-request SSH tunnel teardown (in a finally block inside the request handler)
      destroys the tunnel after each request, making all subsequent requests fail. The
      fix is to move tunnel lifecycle to FastAPI lifespan (startup/shutdown). This is
      the recommended FastAPI pattern for managing stateful resources.

      Decision:
      Move get_engine() call and tunnel teardown to a @asynccontextmanager lifespan
      function. Engine and tunnel stored in request.app.state. Return (engine, tunnel_or_None)
      pair from get_engine() instead of attaching .tunnel attribute to the engine object.
      Replace asyncio.get_event_loop().run_in_executor() with asyncio.to_thread() for
      Python 3.10+ compatibility.

      Consequences:
      Positive: tunnel created once and reused; graceful shutdown guaranteed by ASGI
      protocol; no hasattr guards needed; Python 3.10+ compatible.
      Negative: startup failure (bad SSH credentials) prevents application start rather
      than degrading gracefully — this is the correct behaviour for a hard dependency.

  - kind: adr
    title: "64 KB YAML Frontmatter Size Gate to Prevent Billion-Laughs DoS (CWE-400)"
    confidence: 0.9
    tags: [adr, security, yaml, dos, ingestion, cwe-400]
    related_artifacts:
      - aidlc-docs/operations/adrs/2026-05-19t20-50-00z-metadata-refactor-0005-yaml-frontmatter-size-gate.md
    body: |
      Status: Accepted

      Context:
      yaml.safe_load prevents code execution but not YAML alias-based billion-laughs DoS
      (CWE-400). A malicious frontmatter block with deeply nested anchors causes
      exponential memory/CPU expansion. The corpus is currently trusted, but a future
      commit update or untrusted-upload extension removes that guarantee.

      Decision:
      Enforce a 64 KB maximum byte length on the raw YAML frontmatter block before
      calling yaml.safe_load. Defined as _MAX_FRONTMATTER_BYTES = 65_536 in
      metadata_helpers.py. Exceeding documents are skipped with a warning log entry.
      Threshold chosen with 80x safety margin over largest observed legitimate frontmatter.

      Consequences:
      Positive: eliminates billion-laughs attack surface below threshold; O(1) check;
      portable (no UNIX signals or subprocess needed); simple to audit.
      Negative: does not protect against sub-64KB bombs (limited expansion ratio);
      threshold is a magic number (documented in code).

  - kind: adr
    title: "ELI URL Scheme Allowlist in derive_eli and API Serialiser (CWE-601)"
    confidence: 0.9
    tags: [adr, security, url-validation, eli, cwe-601, open-redirect]
    related_artifacts:
      - aidlc-docs/operations/adrs/2026-05-19t20-50-00z-metadata-refactor-0006-eli-url-scheme-allowlist.md
    body: |
      Status: Accepted

      Context:
      ELI values from YAML frontmatter are stored and returned as hrefs in the Angular
      frontend. Without scheme validation, a corpus document can inject a javascript:
      or data: URI (CWE-601). Angular's [href] sanitisation is version-dependent and
      removed by SSR. The correct defence is server-side.

      Decision:
      Add allowlist scheme check at two enforcement points: (1) derive_eli in
      metadata_helpers.py — only return values starting with https://, http://, or
      eli/ (relative BOE path); return None otherwise. (2) API serialiser in main.py
      fuentes list comprehension — validate each eli value against the same allowlist
      before including in response; replace invalid with empty string.

      Consequences:
      Positive: eliminates javascript:/data: URI injection at both storage and
      transmission boundaries; defence-in-depth (two independent enforcement points);
      no impact on legitimate BOE ELI values.
      Negative: new ELI URI schemes require allowlist update (constant _ELI_ALLOWED_PREFIXES
      in metadata_helpers.py); relative eli/ paths require frontend handling.
