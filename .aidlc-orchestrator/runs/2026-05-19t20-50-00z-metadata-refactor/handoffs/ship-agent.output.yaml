  to: "0.2.0"
  kind: minor
  rationale: >
    This run adds backward-incompatible API surface expansion (fuentes shape grows from
    3 to 9 fields), new public metadata columns in the database schema, a new
    only_active filter with expanded semantics, and four security fixes. Under SemVer,
    new functionality in a backward-compatible fashion is a minor bump; however, the
    fuentes shape change is a breaking change for consumers that pattern-match on exactly
    three fields. The project is pre-1.0, so a minor bump (0.1.0 -> 0.2.0) is used
    per convention (pre-1.0 minor bumps signal feature-level changes). A major bump
    is not warranted because the only known consumer (thermia-front) has been updated
    in this same run.

