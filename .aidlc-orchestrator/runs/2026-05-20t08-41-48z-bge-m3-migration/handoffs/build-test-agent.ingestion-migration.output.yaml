emitted_knowledge:
  - kind: lesson
    title: pgvector must be pre-installed for upsert_documents tests
    body: "What: TestUpsertDocuments (8 tests) failed with ModuleNotFoundError: No module named 'pgvector' on first run.\nWhy: app/db/models.py imports pgvector.sqlalchemy.Vector at module level, which is triggered when upsert_documents calls 'from app.db.models import Document'.\nWhere: thermia-back/app/db/models.py:10 — called from scripts/ingest.py:367.\nLearned: pgvector must be in requirements for the test environment, not just production. The test that should have caught it (a conftest.py environment check) does not exist — tests import models directly without checking for pgvector. Adding pgvector to a dev-only requirements-test.txt or ensuring pip install -r requirements.txt is run before tests would prevent this class of failure."
    tags: ["environment", "pgvector", "test-setup", "ingestion"]
    confidence: 0.9

