emitted_knowledge:
  - kind: pattern
    confidence: 0.75
    title: "AST-based static tests for import cleanup verification"
    body: |
      What: Use Python's ast module to statically verify that a function body no longer
      imports specific modules or references specific names — without executing the function.
      Why: Runtime tests for import cleanup require mocking all dependencies the function
      touches, which is brittle. AST tests are simpler, faster, and fail clearly.
      Where: test_ingestion.py TestMainNoCohereReferences, test_key_pool.py TestIngestKeyPool.
      Learned: ast.walk(main_func) with isinstance checks for ast.Import/ast.ImportFrom
      and ast.Constant nodes provides a reliable, portable way to assert code structure.
      Use pathlib.Path(__file__).resolve().parent.parent to find the source file
      regardless of cwd.

  - kind: adr
    confidence: 0.80
    title: "Simple fixed-delay retry replaces key-rotation retry for Ollama"
    body: |
      Context: The Cohere generate_embeddings used a complex retry system with key rotation
      via KeyPool (mark_failed, classify_failure, AllKeysExhaustedError) and exponential
      back-off delays (10s, 30s, 60s).
      Decision: Replace with _EMBED_RETRY_COUNT=2 (3 total attempts) and _EMBED_RETRY_DELAY=5.0s
      fixed delay. Ollama runs locally — no API keys, no rate-limiting, no key pool needed.
      Consequences: generate_embeddings signature simplifies to (texts) only. main() no longer
      needs to manage a KeyPool singleton. Tests are simpler (no pool/client mocking).
      Trade-offs: Retries are for transient connection errors only, not rate limits.
      If Ollama goes down, 3 attempts × 5s = 15s max wait per batch before propagation.
