emitted_knowledge:
  - kind: pattern
    confidence: 0.8
    title: "Duck-typing for mocked module exception class checks"
    body: |
      What: When a module (e.g. ollama) is patched wholesale with unittest.mock.patch,
      isinstance(exc, module.SomeError) raises TypeError because module.SomeError is
      a MagicMock, not a type.
      Why: Use hasattr(exc, 'status_code') duck-typing instead — works with both real
      exception instances and MagicMock-raised exceptions.
      Where: thermia-back/app/retrieval/embedder.py get_query_embedding()
      Learned: Document the rationale inline so future readers understand why isinstance
      is not used.

