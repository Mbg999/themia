emitted_knowledge:
  - kind: lesson
    title: "Test may bypass new validation gates if they use synthetic inputs"
    body: >
      What: _is_valid_retrieval() was added to llm.py as part of the bge-m3
      migration, gating analyze_with_llm on context containing legal keywords.
      The existing TestLLMKeyPool tests pass synthetic context like "context text"
      or "ctx" that don't satisfy the gate, causing 4 false-positive failures.

      Why: The validation gate was introduced alongside the Cohere to Groq migration
      in the key-pool-cleanup layer, but the tests were not updated to use
      realistic context strings containing legal keywords (ley, articulo, etc.).

      Where: thermia-back/app/retrieval/llm.py:66-87 (_is_valid_retrieval),
      thermia-back/tests/retrieval/test_key_pool.py:485-582 (TestLLMKeyPool)

      Learned: When adding a validation gate that runs before the main code path,
      existing tests that use synthetic/minimal inputs WILL bypass the real code
      and silently pass/fail for the wrong reason. Either:
      (a) update test inputs to pass the new gate, or
      (b) test the gate separately and mock it in behavioral tests.
      The tests that SHOULD have caught this: test_no_cohere_provider_in_agnostic_tests
      and the other red-test helpers passed, but they verify Cohere provenance, not
      the validation gate's effect on Groq tests.
    tags:
      - test-regression
      - validation-gate
      - key-pool-cleanup
      - bge-m3-migration
