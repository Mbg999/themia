status: complete

version_proposal:
  from: "0.2.0"
  to: "0.3.0"
  kind: minor
  rationale: >
    Replaces a third-party cloud API provider (Cohere embed-multilingual-v3.0) with a
    self-hosted Ollama service (BGE-M3). This changes a runtime dependency and the
    embedding provider contract (model name, API surface, credential model). The 1024-dim
    vector interface is preserved, so no pgvector schema migration is required — but
    existing data must be re-ingested (embedding spaces are incompatible). New security
    controls (_validate_host, timeout) and a new env var surface (OLLAMA_HOST,
    OLLAMA_MODEL replacing COHERE_API_KEYS) constitute a meaningful functional boundary.
    Not a breaking API change for callers of the FastAPI service, but significant enough
    to be minor rather than patch.

