emitted_knowledge:
  - kind: adr
    confidence: 0.9
    tags:
      - adr
      - embeddings
      - ollama
      - architecture
      - provider-migration
    body: |
      Status: Accepted
      Context: Thermia used Cohere embed-multilingual-v3.0 since MVP. Cohere API costs
        were too high. A self-hosted Ollama node at https://ollama.cvbooster.es already
        runs bge-m3 (1024-dim), matching the existing pgvector schema dimension.
      Decision: Replace Cohere with Ollama BGE-M3 singleton in embedder.py and ingest.py.
        KeyPool stripped of Cohere logic. OLLAMA_HOST/OLLAMA_MODEL env vars replace
        COHERE_API_KEYS. cohere package removed, ollama package added.
      Consequences: Eliminates Cohere API costs. No schema migration. Re-ingestion of
        existing pgvector data is mandatory (incompatible embedding spaces). Ollama node
        availability is now on the critical path for serving and ingestion.
    related_artifacts:
      - aidlc-docs/operations/adrs/2026-05-20t08-41-48z-bge-m3-migration-0001-ollama-bge-m3-as-embedding-backend.md

  - kind: adr
    confidence: 0.9
    tags:
      - adr
      - security
      - ssrf
      - cwe-918
      - ollama
    body: |
      Status: Accepted
      Context: OLLAMA_HOST is a caller-supplied env var passed to ollama.Client. Without
        validation, a misconfigured or attacker-controlled host value turns the embedder
        into an SSRF proxy (CWE-918). The ingestion CLI shares the same risk.
      Decision: _validate_host() enforces https:// for non-localhost hosts. Called in
        FastAPI lifespan (fail-fast startup) and in EmbedderClient.__init__. Same
        function applied in ingest.py. Exception logging sanitised — URL not logged.
      Consequences: Operators using plain http:// to non-localhost Ollama nodes must add
        TLS or use SSH port-forwarding. IPv6 loopback (::1) not yet in the allowlist.
        DNS rebinding out of scope for current threat model.
    related_artifacts:
      - aidlc-docs/operations/adrs/2026-05-20t08-41-48z-bge-m3-migration-0002-ssrf-protection-ollama-host-validation.md
