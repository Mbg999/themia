emitted_knowledge:
  - kind: pattern
    confidence: 0.82
    title: Lazy singleton with pool injection for testable API clients
    body: |
      Module-level singleton (e.g. _cohere_pool) is None by default; get_cohere_pool() initialises it on first call via from_env(). Tests inject a KeyPool directly. Avoids os.environ monkey-patching; singleton still shared in production.
    tags: ["api-keys", "testing", "singleton", "python"]
    related_artifacts:
      - thermia-back/app/retrieval/embedder.py
      - thermia-back/app/retrieval/llm.py
  - kind: pattern
    confidence: 0.79
    title: Rotate-once-after-budget vs rotate-immediately per call cost
    body: |
      Embed calls exhaust in-key retry budget (3 delays) then rotate. LLM calls rotate on first rotating failure then retry once. Right retry depth depends on call cost not just failure signal.
    tags: ["api-keys", "fallback", "retry", "cohere", "groq"]
    related_artifacts:
