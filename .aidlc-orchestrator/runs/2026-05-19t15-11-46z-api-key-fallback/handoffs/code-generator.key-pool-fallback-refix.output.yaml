  - "[FIX-2] key_pool.py: Updated _current_unlocked() to reset _was_degraded and
    _was_exhausted flags after cooldown expiry re-admits keys. The reset happens after
    computing healthy_count: if healthy_count > 1, _was_degraded is cleared; if
    healthy_count > 0, _was_exhausted is cleared. This ensures future degradation/exhaustion
    events fire their log transitions again."

  - "[TEST-B] test_key_pool.py: Added TestFlagResetAfterRecovery class with
