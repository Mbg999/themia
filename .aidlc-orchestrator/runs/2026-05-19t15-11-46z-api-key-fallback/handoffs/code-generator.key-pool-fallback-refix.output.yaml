emitted_knowledge:
  - kind: pattern
    title: "Module-level API key frozen at import time — test isolation via conftest + reload"
    body: |
      What: When a FastAPI module reads a config value (e.g. API_KEY) at module load time
      using os.environ.get(), all tests that import that module share the frozen value.
      Why: Python caches module imports; monkeypatch.setenv() after the first import is
      a no-op for module-level constants.
      Where: thermia-back/app/main.py (_API_KEY), thermia-back/tests/conftest.py,
      thermia-back/tests/test_main_auth.py.
      Learned: Set the env var in conftest.py BEFORE any import chain can reach the module.
      For tests that need to verify rejection (short/missing key), use importlib.reload()
      inside a sys.modules cleanup context. Never rely on monkeypatch.setenv() to change
      a module-level constant after the module is cached.
    tags: ["python", "testing", "fastapi", "security", "env-vars"]
    confidence: 0.85

  - kind: antipattern
    title: "Stubbing heavy imports at test module level pollutes sys.modules globally"
    body: |
      What: Inserting MagicMock stubs into sys.modules at module level in a test file
      (e.g. _stub_heavy_imports() called at import time) pollutes sys.modules for the
      entire pytest session.
      Why: All test files collected in the same session share sys.modules. A stub inserted
      at module level persists and prevents real imports in other test files.
      Where: Discovered in tests/test_main_auth.py when TestEmbedderKeyPool tests started
      failing with ImportError: cannot import name 'retrieval' from 'app'.
      Fix: Use a context manager (_stubbed_heavy_imports()) that saves originals on entry
      and restores them on exit. Call it inside each test method, not at module level.
    tags: ["python", "testing", "sys.modules", "isolation"]
    confidence: 0.9

  - kind: pattern
    title: "Key-tracking guard in client factories: compare active key, not None check"
    body: |
      What: When a singleton client is tied to a rotating API key (e.g. cohere.Client),
      use an explicit key-tracking variable (_client_key) rather than relying on callers
      to null out the singleton after rotation.
      Why: The None-check approach creates a fragile implicit contract: every caller that
      rotates must remember to null the singleton. If a second consumer uses the pool, the
      contract breaks silently.
      Where: thermia-back/app/retrieval/embedder.py _get_client() / _cohere_client_key.
      Learned: Store the key used to build the current client. On every factory call,
      compare pool.current() to the stored key. Rebuild if they differ. This is
      self-contained and requires no cooperation from callers.
    tags: ["python", "api-keys", "singleton", "rotation", "design-pattern"]
    confidence: 0.88

