emitted_knowledge:
  - kind: pattern
    title: "Multi-key provider fallback via per-provider KeyPool with sticky-then-rotate"
    body: >
      When integrating multiple free-tier API accounts for the same provider,
      use a per-provider KeyPool abstraction with sticky-then-rotate
      semantics rather than round-robin: it keeps debugging predictable
      (one key handles a stream of requests, so log correlation works),
      while still draining quota fairly because once a key fails its
      cool-down keeps it out of the rotation. Pair with provider-specific
      cool-down windows (Cohere 30 d / Groq 1 d) to match each provider's
      actual quota reset cadence. Wire detection signals as a small enum
      of reason codes (429, provider-specific quota body match, persistent
      5xx) rather than parsing raw exceptions at every call site — this
      keeps the call sites thin and makes the pool unit-testable in
      isolation.
    tags: ["api-keys", "fallback", "resilience", "cohere", "groq", "free-tier"]
    related_artifacts:
      - "aidlc-docs/inception/requirements/2026-05-19t15-11-46z-api-key-fallback-requirements.md"
    confidence: 0.85
