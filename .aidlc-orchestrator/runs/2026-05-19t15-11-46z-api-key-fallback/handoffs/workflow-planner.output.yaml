emitted_knowledge:
  - kind: pattern
    title: "Provider-agnostic API-key pool with sticky-then-rotate semantics"
    body: "When wrapping free-tier providers behind a fallback pool, compose the pool ABOVE any in-key retry budget the SDK already has — rotate only after the SDK exhausts its own retries, never on the first rate-limit error. Pair sticky-then-rotate (same key reused until it fails) with per-provider cool-down windows that match the provider's quota reset cadence (Cohere Trial = 30 d, Groq daily = 1 d). Cool-down state in-process only; persistence is YAGNI for typical worker lifetimes."
    tags: ["api-keys", "fallback", "rate-limiting", "cohere", "groq", "free-tier"]
    related_artifacts:
      - "aidlc-docs/inception/requirements/2026-05-19t15-11-46z-api-key-fallback-requirements.md"
      - "aidlc-docs/inception/plans/2026-05-19t15-11-46z-api-key-fallback-execution-plan.md"
    confidence: 0.85
  - kind: adr
    title: "Single-unit plan for the API-key fallback (no layer parallelism)"
    body: "Rejected multi-unit decomposition (e.g. 'pool-core' + 'embedder-wiring' + 'llm-wiring' + 'ingest-wiring' as parallel units) because the four would share one Python import graph and would force a build/test cycle per unit for no parallelism win. One unit, sequential tasks, vertical slice: KeyPool core + unit tests land first; the three call-site wirings fan out from T5 in parallel; .env.example closes the unit."
    tags: ["planning", "single-unit", "vertical-slice"]
    related_artifacts:
