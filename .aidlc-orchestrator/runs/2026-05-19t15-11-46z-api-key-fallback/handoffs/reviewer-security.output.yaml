  body: 'FastAPI auth bypass via environment-gated skip: when authentication is conditioned
    on an environment variable (e.g., THERMIA_ENV=local), any misconfiguration or
    accidental env propagation to non-local environments silently disables all access
    control. The attack vector is environmental misconfiguration — no active exploit
    needed. Root cause is conflating deployment environment detection with security
    policy.

    '
  title: FastAPI auth bypass via env-gated authentication skip
- kind: antipattern
  confidence: 0.95
  tags:
  - security
  - CWE-312
  - fastapi
  - python
  body: 'Empty-string default for bearer token comparison: reading a secret with os.environ.get("API_KEY",
    "") and comparing directly allows any request that sends an empty bearer token
    to authenticate successfully when the variable is unset. Root cause is absent
    startup validation of required secrets. Pair with: missing constant-time comparison
    enabling timing-oracle attacks against string equality.

    '
  title: Empty-string default enables empty-bearer token authentication
