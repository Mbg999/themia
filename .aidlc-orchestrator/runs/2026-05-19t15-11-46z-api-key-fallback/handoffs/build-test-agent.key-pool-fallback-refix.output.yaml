emitted_knowledge:
  - kind: lesson
    title: "slowapi @limiter.limit requires Request in FastAPI function signature even when not used in body"
    body: "What: The 'request: Request' parameter in a FastAPI endpoint decorated with @_limiter.limit appears unused to static analysers (Pylance reports 'No se accede a request'), but is mandatory. Why: slowapi's rate-limiter extracts the remote address via get_remote_address(request) at the middleware/decorator layer — the parameter is consumed by the decorator wrapping, not by the function body. Where: thermia-back/app/main.py analyze() endpoint. Learned: Never remove or suppress a Request parameter in a slowapi-decorated FastAPI endpoint based on a 'unused variable' diagnostic. The test that should catch this but doesn't: the existing TestAnalyzeAuth tests would fail with a 500 if Request were removed, but the static analyser warning looks like a genuine smell. Add a comment explaining why Request is required."
    tags:
      - fastapi
      - slowapi
      - rate-limiting
      - false-positive
    related_artifacts:
      - thermia-back/app/main.py
    confidence: 0.9
