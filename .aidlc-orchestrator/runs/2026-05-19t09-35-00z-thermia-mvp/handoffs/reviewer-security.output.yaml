emitted_knowledge:
- kind: antipattern
  title: Client-side API key for server authentication
  confidence: 0.95
  tags:
  - security
  - CWE-798
  - angular
  - frontend
  body: 'ROOT CAUSE: API key intended for server-side auth was hardcoded in Angular
    environment.ts/environment.prod.ts and shipped to every browser in the JS production
    bundle. ATTACK VECTOR: Any user opens DevTools, searches for "Bearer" or inspects
    the /analyze XHR request, extracts the key, and can call the backend API directly
    without any client-side restriction. This pattern also leaks the key through git
    history, Docker images, and every HTTP request sent by the SPA. REMEDIATION PATTERN:
    Server authentication tokens must NEVER be embedded in client-side code. Use a
    proper auth flow (OAuth2 PKCE, session cookies, or API gateway with user authentication).
    If the service is truly public-facing, remove the API key requirement and rely
    on other controls (rate limiting, IP allowlisting, CAPTCHA).'
- kind: antipattern
  title: Missing resource limits on file upload endpoints
  confidence: 0.95
  tags:
  - security
  - CWE-770
  - fastapi
  - dos
  body: 'ROOT CAUSE: FastAPI endpoint accepts file uploads with no size limit. file.read()
    loads the entire request body into memory. ATTACK VECTOR: Attacker sends multi-gigabyte
    payload (or compression-bomb) to exhaust server RAM. With no rate limiting, automated
    scripts can DoS the service trivially. REMEDIATION PATTERN: Always set max_size
    on FastAPI/Starlette applications. Validate Content-Length header before reading
    body. Add rate limiting as complementary control.'
- kind: antipattern
  title: Dockerfile COPY . . includes secrets
  confidence: 0.95
  tags:
  - security
  - CWE-312
  - docker
  - secrets
  body: 'ROOT CAUSE: Backend Dockerfile uses COPY . . without a .dockerignore that
    excludes .env. The .env file with API keys, SSH passwords, and DB credentials
    is baked into every Docker image layer. ATTACK VECTOR: Anyone with docker pull
    access or access to image registries/CI caches can run "docker history" or extract
    layers to retrieve all secrets. REMEDIATION PATTERN: Always add .dockerignore
    with .env, *.key, *.pem patterns. Never copy secrets into images. Inject at runtime
    via environment variables, secrets mounts, or a secrets manager.'
- kind: antipattern
  title: Unpinned external repository clone in ingestion pipeline
  confidence: 0.95
  tags:
  - security
  - CWE-829
  - supply-chain
  - ingestion
  body: 'ROOT CAUSE: The ingestion script clones a GitHub repo using default branch
    without pinning to an immutable commit hash. ATTACK VECTOR: If the upstream repo
    is compromised, the legal corpus fed to the vector database and LLM is attacker-controlled,
    enabling data poisoning and prompt injection at scale across all deployments.
    REMEDIATION PATTERN: Always pin external code clones to a specific commit hash.
    Verify the hash after clone. Store the expected hash as a config constant.'
- kind: antipattern
  title: No rate limiting on authenticated API endpoints
  confidence: 0.95
  tags:
  - security
  - CWE-307
  - api
  - rate-limiting
  body: 'ROOT CAUSE: /analyze endpoint has no rate limiting despite calling expensive
    external APIs (Cohere embeddings, Groq LLM). ATTACK VECTOR: With the API key exposed
    in the frontend (see antipattern "Client-side API key"), an attacker can call
    /analyze at high volume to (a) exhaust the server, (b) cause financial damage
    through API billing, (c) brute-force alternative auth tokens. REMEDIATION PATTERN:
    Always implement rate limiting on authenticated endpoints, especially those that
    call paid third-party APIs. Layer rate limiting per IP and per token if tokens
    exist server-side.'
