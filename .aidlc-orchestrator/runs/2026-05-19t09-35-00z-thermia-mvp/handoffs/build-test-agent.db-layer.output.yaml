emitted_knowledge:
  - kind: lesson
    title: "sshtunnel 0.4.0 incompatible with paramiko >= 3.x"
    body: "What: SSHTunnelForwarder.__init__ calls get_keys() which references paramiko.DSSKey, removed in paramiko 3.0. Why: sshtunnel is unmaintained since 2021 and has not tracked paramiko's breaking changes. Where: thermia-back/requirements.txt. Learned: always pin paramiko<3 when using sshtunnel<=0.4.0. The test suite did not catch this because unit tests mock SSHTunnelForwarder entirely — the incompatibility only manifests at actual import/instantiation time."
    tags: [sshtunnel, paramiko, dependency-pinning, python]
    confidence: 0.95
  - kind: lesson
    title: "alembic env.py must use app connection factory for SSH-tunnelled local environments"
    body: "What: The code-generator produced an alembic/env.py that reads DATABASE_URL directly via engine_from_config, bypassing the get_engine() SSH tunnel factory. For THERMIA_ENV=local this means the tunnel is never opened and migrations fail. Why: Standard alembic boilerplate uses DATABASE_URL; the tunnel integration requires explicitly calling the application's connection factory. Where: thermia-back/alembic/env.py. Learned: For any project with environment-specific connection factories (SSH tunnel, IAM auth, etc.), alembic env.py must import and use that factory rather than reading a URL directly. Tests that mock get_engine() would have caught this gap if they covered the alembic invocation path."
    tags: [alembic, sshtunnel, connection-factory, code-generator-gap]
    confidence: 0.9
  - kind: lesson
    title: "SSHTunnelForwarder with password auth requires allow_agent=False and host_pkey_directories=[]"
    body: "What: SSHTunnelForwarder by default scans ~/.ssh/ for key files and queries the SSH agent before attempting password auth. If a passphrase-protected key is found, the tunnel fails before reaching password auth. Why: sshtunnel treats available key files as higher priority than password. Where: thermia-back/app/db/connection.py. Learned: Password-only SSH tunnel connections must always set allow_agent=False and host_pkey_directories=[] to avoid interference from local key files. The existing test mocked SSHTunnelForwarder so it did not catch the missing parameters until the constructor call signature assertion failed."
    tags: [sshtunnel, paramiko, ssh-auth, password-auth]
    confidence: 0.9

