emitted_knowledge:
  - kind: antipattern
    title: "reload() inside patch() context re-binds module names, defeating the mock"
    confidence: 0.85
    body: |
      What: Using reload() inside a patch() context manager to re-bind module-level names.
      Why: When you call reload(mod) inside `with patch('mod.SomeClass', mock):`, the reload
      re-executes the module body, which re-imports SomeClass from its source package. This
      re-binding happens INSIDE the patch context but AFTER the patch installed its mock, so
      the module's SomeClass attribute is now the real class again — the mock is unreachable.
      The test then calls a real constructor (e.g. SSHTunnelForwarder) which may fail due to
      system state (missing paramiko.DSSKey in newer paramiko versions).
      Where: Any test that patches module-level names and then calls reload() on the same module.
      Learned: Use patch.object(mod, 'Name', mock) AFTER the module is already imported. This
      patches the module's namespace directly without a reload, and the patch survives for the
      duration of the with-block. No reload needed when env vars are read at function-call time
      (not at import time).

  - kind: pattern
    title: "patch.object(mod, 'name') for deterministic module-level mock injection"
    confidence: 0.80
    body: |
      What: patch.object(mod, 'name') for deterministic module-level mock injection.
      Why: When a module imports a name at the top level (e.g., `from sshtunnel import
      SSHTunnelForwarder`), patching via `patch('app.db.connection.SSHTunnelForwarder', mock)`
      or `patch.object(conn_mod, 'SSHTunnelForwarder', mock)` replaces the attribute on the
      already-loaded module object. This is deterministic because no re-import occurs.
      Where: Any Python unit test that needs to mock a dependency the module imported at top level.
      Learned: Import the module once at test setup or at the top of the test function, then use
      patch.object(mod, 'attr_name', ...) inside the with-block. Combine with monkeypatch.setenv
      for env-var-driven branching logic. Do NOT reload() inside patch() contexts.
